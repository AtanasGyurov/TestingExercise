name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore
        run: dotnet restore TestingExercise.sln

      - name: Build
        run: dotnet build TestingExercise.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test TestingExercise.sln --configuration Release --no-build --verbosity normal